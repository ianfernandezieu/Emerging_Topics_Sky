# Modeling configuration

# Target definition
target:
  # ACPS weights
  acps_movement_weight: 0.6
  acps_pressure_weight: 0.4
  # Classification thresholds (percentiles)
  low_threshold: 60
  high_threshold: 85

# Forecast horizons (hours)
horizons:
  - 1
  - 3

# Train/validation/test split ratios (chronological)
split:
  train: 0.70
  validation: 0.15
  test: 0.15

# Lag features (hours)
lag_hours:
  - 1
  - 2
  - 3
  - 6
  - 12
  - 24
  - 48
  - 168

# Rolling window sizes (hours)
rolling_windows:
  mean: [3, 6, 24]
  std: [24]

# Model parameters
models:
  hist_gradient_boosting:
    max_iter: 200
    max_depth: 6
    learning_rate: 0.1
    random_state: 42
  random_forest:
    n_estimators: 200
    max_depth: 12
    random_state: 42

# Evaluation
evaluation:
  regression_metrics: ["mae", "rmse", "r2"]
  classification_metrics: ["f1", "precision", "recall", "balanced_accuracy"]
